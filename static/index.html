<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClarioAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg px-3">
  <span class="navbar-brand fw-semibold">ClarioAI</span>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span id="status-badge" class="badge bg-secondary">Idle</span>
    <span id="iter-counter" class="text-secondary small d-none">Iteration <span id="iter-current">0</span> / <span id="iter-max">3</span></span>
  </div>
</nav>

<!-- Main layout -->
<div class="main-layout">

  <!-- ── Left Panel ── -->
  <div class="left-panel">
    <div class="card h-100 d-flex flex-column">

      <ul class="nav nav-tabs px-3 pt-2" id="left-tabs">
        <li class="nav-item">
          <button class="nav-link active" id="tab-input-btn" data-target="tab-input">Input</button>
        </li>
        <li class="nav-item">
          <button class="nav-link disabled" id="tab-review-btn" data-target="tab-review">Final Review</button>
        </li>
      </ul>

      <div class="card-body flex-grow-1 overflow-auto">

        <!-- Tab: Input -->
        <div id="tab-input">

          <!-- Initial input form (shown when idle) -->
          <div id="input-form">
            <div class="mb-3">
              <label class="form-label small text-secondary">Sector & Domain</label>
              <input id="inp-sector" type="text" class="form-control form-control-sm"
                     placeholder="e.g. F&B, EdTech, HealthTech" />
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">Target Audience</label>
              <input id="inp-audience" type="text" class="form-control form-control-sm"
                     placeholder="e.g. College students, SMEs" />
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">Business Idea</label>
              <textarea id="inp-prompt" class="form-control form-control-sm" rows="5"
                        placeholder="Describe your business idea in detail…"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">Max Iterations</label>
              <select id="inp-iterations" class="form-select form-select-sm">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
              </select>
            </div>
            <button id="btn-start" class="btn btn-primary btn-sm w-100">Analyze</button>
          </div>

          <!-- Feedback panel (shown when graph requests input mid-run) -->
          <div id="feedback-panel" class="d-none">
            <div class="alert alert-warning py-2 small mb-3">
              <strong>Orchestrator needs your input</strong> before continuing to the next iteration.
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">Orchestrator Assessment</label>
              <div id="feedback-assessment" class="p-2 rounded small bg-white border"
                   style="white-space: pre-wrap; max-height: 180px; overflow-y: auto;"></div>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">Your Feedback</label>
              <textarea id="feedback-text" class="form-control form-control-sm" rows="4"
                        placeholder="Guide the agents for the next iteration…"></textarea>
            </div>
            <button id="btn-submit-feedback" class="btn btn-primary btn-sm w-100">Continue Analysis</button>
          </div>

          <!-- Running state (shown while graph is running without needing feedback) -->
          <div id="running-indicator" class="d-none text-center py-4">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <p class="small text-secondary mb-0">Agents are working…</p>
            <p class="small text-secondary" id="running-current-agent"></p>
          </div>

        </div><!-- /tab-input -->

        <!-- Tab: Final Review -->
        <div id="tab-review" class="d-none">
          <div class="mb-3">
            <label class="form-label small text-secondary">Orchestrator Verdict</label>
            <div id="review-verdict" class="p-2 rounded small bg-white border"
                 style="white-space: pre-wrap; max-height: 200px; overflow-y: auto; color: var(--text-secondary);"></div>
          </div>
          <div class="mb-3">
            <label class="form-label small text-secondary">Your Final Feedback (optional)</label>
            <textarea id="review-feedback" class="form-control form-control-sm" rows="4"
                      placeholder="Any additional comments on the report…"></textarea>
          </div>
          <div class="d-grid gap-2">
            <button id="btn-accept" class="btn btn-success btn-sm">Accept Report</button>
            <button id="btn-revise" class="btn btn-outline-primary btn-sm">Request Full Revision</button>
          </div>
        </div><!-- /tab-review -->

      </div>
    </div>
  </div><!-- /left-panel -->

  <!-- ── Right Panel ── -->
  <div class="right-panel">
    <div class="card h-100 d-flex flex-column">

      <ul class="nav nav-tabs px-3 pt-2" id="right-tabs">
        <li class="nav-item">
          <button class="nav-link active" id="tab-activity-btn" data-target="tab-activity">Agent Activity</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="tab-report-btn" data-target="tab-report">Final Report</button>
        </li>
      </ul>

      <div class="card-body flex-grow-1 overflow-auto">

        <!-- Tab: Agent Activity -->
        <div id="tab-activity">
          <div id="activity-log">
            <p class="text-secondary small text-center mt-4">No activity yet. Start an analysis to see agent logs.</p>
          </div>
        </div>

        <!-- Tab: Final Report -->
        <div id="tab-report" class="d-none">
          <div id="report-placeholder" class="text-secondary small text-center mt-4">
            Final report will appear here once analysis is complete.
          </div>
          <div id="report-content" class="d-none markdown-body"></div>
        </div>

      </div>
    </div>
  </div><!-- /right-panel -->

</div><!-- /main-layout -->

<!-- Toast container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
  <div id="toast" class="toast align-items-center text-bg-danger border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-body">Error</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
