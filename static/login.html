<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClarioAI — Masuk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 2rem 1.5rem;
    }
    .auth-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      margin-bottom: 0.25rem;
    }
    .auth-sub {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    .fp-note {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.75rem;
      text-align: center;
    }
    .alert { font-size: 0.83rem; }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-brand">ClarioAI</div>
  <div class="auth-sub">Decision Support System</div>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-4" id="auth-tabs">
    <li class="nav-item">
      <button class="nav-link active" id="tab-login-btn" data-tab="login">Masuk</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="tab-register-btn" data-tab="register">Daftar</button>
    </li>
  </ul>

  <!-- Alert -->
  <div id="auth-alert" class="alert d-none" role="alert"></div>

  <!-- Login Form -->
  <div id="form-login">
    <div class="mb-3">
      <label class="form-label small text-secondary">Username</label>
      <input id="login-username" type="text" class="form-control form-control-sm"
             placeholder="Masukkan username" autocomplete="username" />
    </div>
    <div class="mb-3">
      <label class="form-label small text-secondary">Password</label>
      <input id="login-password" type="password" class="form-control form-control-sm"
             placeholder="Masukkan password" autocomplete="current-password" />
    </div>
    <button id="btn-login" class="btn btn-primary btn-sm w-100">Masuk</button>
  </div>

  <!-- Register Form -->
  <div id="form-register" class="d-none">
    <div class="mb-3">
      <label class="form-label small text-secondary">Username</label>
      <input id="reg-username" type="text" class="form-control form-control-sm"
             placeholder="Minimal 3 karakter" autocomplete="username" />
    </div>
    <div class="mb-3">
      <label class="form-label small text-secondary">Password</label>
      <input id="reg-password" type="password" class="form-control form-control-sm"
             placeholder="Minimal 6 karakter" autocomplete="new-password" />
    </div>
    <div class="mb-3">
      <label class="form-label small text-secondary">Konfirmasi Password</label>
      <input id="reg-confirm" type="password" class="form-control form-control-sm"
             placeholder="Ulangi password" autocomplete="new-password" />
    </div>
    <button id="btn-register" class="btn btn-primary btn-sm w-100">Daftar</button>
    <p class="fp-note">Perangkat ini akan diidentifikasi untuk mencegah pembuatan akun ganda.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
'use strict';

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('#auth-tabs .nav-link').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#auth-tabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('form-login').classList.toggle('d-none', tab !== 'login');
    document.getElementById('form-register').classList.toggle('d-none', tab !== 'register');
    hideAlert();
  });
});

// ── Alert helpers ─────────────────────────────────────────────────────────────
function showAlert(msg, type = 'danger') {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.className = `alert alert-${type}`;
}
function hideAlert() {
  document.getElementById('auth-alert').className = 'alert d-none';
}

// ── FingerprintJS — collected silently ────────────────────────────────────────
let _fingerprint = '';
(async () => {
  try {
    const FpModule = await import('https://openfpcdn.io/fingerprintjs/v4');
    const fp = await FpModule.load();
    const result = await fp.get();
    _fingerprint = result.visitorId;
  } catch (_) {
    // fingerprint unavailable — registration will proceed without it
  }
})();

// ── Login ─────────────────────────────────────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', async () => {
  hideAlert();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showAlert('Isi semua field.'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Memproses…';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.detail || 'Login gagal.'); return; }
    window.location.href = data.role === 'admin' ? '/admin' : '/';
  } catch (e) {
    showAlert('Terjadi kesalahan jaringan.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
});

// Allow Enter key on login form
['login-username', 'login-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });
});

// ── Register ──────────────────────────────────────────────────────────────────
document.getElementById('btn-register').addEventListener('click', async () => {
  hideAlert();
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm_password = document.getElementById('reg-confirm').value;
  if (!username || !password || !confirm_password) { showAlert('Isi semua field.'); return; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Memproses…';

  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, confirm_password, fingerprint: _fingerprint }),
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.detail || 'Registrasi gagal.'); return; }
    showAlert('Registrasi berhasil! Mengalihkan…', 'success');
    setTimeout(() => { window.location.href = '/'; }, 1000);
  } catch (e) {
    showAlert('Terjadi kesalahan jaringan.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Daftar';
  }
});

// ── Redirect if already logged in ─────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/auth/me');
    const d = await r.json();
    if (d.authenticated) window.location.href = '/';
  } catch (_) {}
})();
</script>
</body>
</html>
